  <script>
    (function(){
      var openBtn = document.getElementById('__contact_open');
      var panel = document.getElementById('__contact_panel');
      var closeBtn = document.getElementById('__contact_close');
      var form = document.getElementById('__contact_form');
      var status = document.getElementById('__contact_status');
      openBtn.addEventListener('click', function(){ panel.style.display = 'flex'; });
      closeBtn.addEventListener('click', function(){ panel.style.display = 'none'; });
      panel.addEventListener('click', function(e){ if (e.target === panel) panel.style.display = 'none'; });
      form.addEventListener('submit', async function(e){
        e.preventDefault();
        status.textContent = 'sending…';
        var fd = new FormData(form);
        var body = {
          email: fd.get('email'),
          message: fd.get('message'),
          turnstileToken: fd.get('cf-turnstile-response')
        };
        try {
          var res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (res.ok) {
            status.textContent = 'sent — thanks!';
            form.reset();
            if (window.turnstile) window.turnstile.reset();
            setTimeout(function(){ panel.style.display = 'none'; status.textContent = ''; }, 1500);
          } else {
            var data = await res.json().catch(function(){ return {}; });
            status.textContent = data.error || 'failed to send, try again';
          }
        } catch (err) {
          status.textContent = 'network error, try again';
        }
      });
    })();
  </script>

  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {

        e.target.tagName, String(e.target.src || e.target.href || ''));

    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"016d6d02-029c-4940-8ee7-9b37a0bc2851\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   crabcc · webfonts\n   JetBrains Mono — primary mono + wordmark/display (terminal feel)\n   IBM Plex Sans  — long-form / marketing body\n   Self-hosted woff2 (latin). Source: fontsource.org\n   ============================================================ */\n\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"08b1f66c-0d6b-4a10-9f4b-f85851b8761c\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c5d2289d-f07b-433d-b3b6-ce40d68e63bf\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e8082462-835c-4188-b5e8-0ccd6d4ab6df\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"296899ff-0dea-4092-9a88-64374b534f68\") format(\"woff2\");\n}\n\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"35481201-213a-4086-9167-27cadc009249\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"230cf426-7586-4dac-8403-7e77be649cd2\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d53f24b6-a973-4a4d-ae03-6f0777b1142a\") format(\"woff2\");\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc · color tokens\n   Warm terracotta \"crab\" brand on a near-neutral terminal canvas.\n   Derived from the CLI dashboard theme + the mascot SVG gradients.\n\n   Two layers:\n     1. Base palette  — raw, named hues (--crab-500, --slate-700, …)\n     2. Semantic aliases — role-based (--surface, --text, --accent, …)\n   Consume the SEMANTIC tokens in components; reach for the base\n   palette only when a semantic alias doesn't exist.\n\n   Theme: light is the default (:root). Dark is opt-in via\n   [data-theme=\"dark\"] and auto-applied under prefers-color-scheme.\n   ============================================================ */\n\n:root {\n  /* ---- Base palette: crab (brand) ------------------------- */\n  --crab-50:  #fff7f1;   /* cream — banner bg top, hover wash      */\n  --crab-100: #fbe5da;   /* pale shell — banner bg bottom          */\n  --crab-200: #f5cdbb;   /* soft shell                             */\n  --crab-300: #e88a6a;   /* mascot highlight                       */\n  --crab-400: #e2703f;   /* warm mid                               */\n  --crab-500: #d35400;   /* PRIMARY accent (light)                 */\n  --crab-600: #c25c3f;   /* mascot body base                       */\n  --crab-700: #a84a30;   /* claw shadow                            */\n  --crab-800: #7d3520;   /* deep shell — wordmark ink              */\n  --crab-900: #5a2415;   /* darkest shell                          */\n  --crab-hot: #ff8c42;   /* \"hot\" node / accent (dark)             */\n  --crab-glow:#ffb380;   /* hot highlight                          */\n\n  /* ---- Base palette: neutral (warm-tinted graphite) ------- */\n  --neutral-0:   #ffffff;\n  --neutral-50:  #fafafa;\n  --neutral-100: #f3f3f2;\n  --neutral-200: #e3e3e3;\n  --neutral-300: #cfcfcd;\n  --neutral-400: #a8a8a6;\n  --neutral-500: #6a6a6a;\n  --neutral-600: #4a4a4a;\n  --neutral-700: #2a2a2c;\n  --neutral-800: #161618;\n  --neutral-900: #0e0e10;\n\n  /* ---- Base palette: slate (graph nodes / data ink) ------- */\n  --slate-300: #cfd6dc;\n  --slate-500: #5b7286;\n  --slate-700: #2c3e50;\n\n  /* ---- Base palette: semantic hues ------------------------ */\n  --green-500: #27ae60;  /* live / ok          */\n  --green-400: #2ecc71;\n  --amber-500: #f5a623;  /* warn               */\n  --amber-400: #f6b94a;\n  --red-500:   #c0392b;  /* error / danger     */\n  --red-400:   #e74c3c;\n  --blue-500:  #2c6fb0;  /* info / link        */\n\n  /* ========================================================\n     Semantic aliases — LIGHT (default)\n     ======================================================== */\n  --surface-page:    var(--neutral-50);   /* app background        */\n  --surface-card:    var(--neutral-0);    /* panels, cards         */\n  --surface-sunken:  var(--neutral-100);  /* inset wells, code     */\n  --surface-hover:   var(--crab-50);      /* row / control hover   */\n  --surface-inverse: var(--neutral-900);  /* terminal, tooltips    */\n\n  --text-strong:  #1a1a1a;                /* headings, primary     */\n  --text-body:    #2a2a2c;                /* body copy             */\n  --text-muted:   var(--neutral-500);     /* labels, meta, dim     */\n  --text-faint:   var(--neutral-400);     /* placeholders          */\n  --text-inverse: #f2f2f2;                /* on dark surfaces      */\n  --text-accent:  var(--crab-500);        /* links, emphasis       */\n  --text-on-accent: #ffffff;              /* on filled brand       */\n\n  --border-subtle: var(--neutral-200);    /* default hairline      */\n  --border-strong: var(--neutral-300);    /* inputs, dividers      */\n  --border-accent: var(--crab-500);       /* focus, active edge    */\n\n  --accent:        var(--crab-500);       /* primary brand action  */\n  --accent-hover:  var(--crab-600);       /* hover (darker)        */\n  --accent-press:  var(--crab-700);       /* active/press          */\n  --accent-wash:   var(--crab-50);        /* tinted backgrounds    */\n  --accent-wash-2: var(--crab-100);\n\n  --focus-ring:    color-mix(in oklch, var(--crab-500) 45%, transparent);\n\n  /* role hues (light) */\n  --ok:     var(--green-500);\n  --ok-wash:#e7f6ee;\n  --warn:   var(--amber-500);\n  --warn-wash:#fcf2dd;\n  --danger: var(--red-500);\n  --danger-wash:#fbe7e4;\n  --info:   var(--blue-500);\n  --info-wash:#e6eef6;\n\n  /* data-viz (graph dashboard) */\n  --viz-node:     var(--slate-700);\n  --viz-node-root:var(--crab-500);\n  --viz-node-hot: var(--crab-hot);\n  --viz-edge:     #b8b8b8;\n\n  color-scheme: light;\n}\n\n/* ==========================================================\n   Semantic aliases — DARK\n   Applied explicitly via [data-theme=\"dark\"], or automatically\n   when the OS prefers dark AND no explicit light override.\n   ========================================================== */\n:root[data-theme=\"dark\"] {\n  --surface-page:    var(--neutral-900);\n  --surface-card:    var(--neutral-800);\n  --surface-sunken:  #1c1c1f;\n  --surface-hover:   #2a1f10;\n  --surface-inverse: #000000;\n\n  --text-strong:  #f2f2f2;\n  --text-body:    #e8e8e8;\n  --text-muted:   #8a8a8a;\n  --text-faint:   #6a6a6c;\n  --text-inverse: #1a1a1a;\n  --text-accent:  var(--crab-hot);\n  --text-on-accent: #1a1208;\n\n  --border-subtle: var(--neutral-700);\n  --border-strong: #3a3a3c;\n  --border-accent: var(--crab-hot);\n\n  --accent:        var(--crab-hot);\n  --accent-hover:  var(--crab-glow);\n  --accent-press:  #e2703f;\n  --accent-wash:   #2a1f10;\n  --accent-wash-2: #34250f;\n\n  --focus-ring:    color-mix(in oklch, var(--crab-hot) 50%, transparent);\n\n  --ok:     var(--green-400);\n  --ok-wash:#0f2a1c;\n  --warn:   var(--amber-400);\n  --warn-wash:#2e2510;\n  --danger: var(--red-400);\n  --danger-wash:#2e1512;\n  --info:   #5b9bd5;\n  --info-wash:#13202e;\n\n  --viz-node:     var(--slate-300);\n  --viz-node-root:var(--crab-hot);\n  --viz-node-hot: var(--crab-glow);\n  --viz-edge:     #4a4a4c;\n\n  color-scheme: dark;\n}\n\n/* Auto dark mode: alias the OS preference onto the dark scope without\n   redeclaring tokens (keeps the token index single-sourced from\n   [data-theme=\"dark\"] above). Authors opt a root into auto-dark by\n   leaving data-theme unset; force light with [data-theme=\"light\"]. */\n@media (prefers-color-scheme: dark) {\n  :root:not([data-theme=\"light\"]):not([data-theme=\"dark\"]) {\n    color-scheme: dark;\n  }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc · typography tokens\n   Monospace-first: the product is a CLI. JetBrains Mono carries\n   the wordmark, UI chrome, code and data. IBM Plex Sans handles\n   long-form reading (docs, marketing prose).\n   ============================================================ */\n\n:root {\n  /* ---- Families ----------------------------------------- */\n  --font-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", \"SFMono-Regular\",\n               Menlo, Consolas, \"Liberation Mono\", monospace;\n  --font-sans: \"IBM Plex Sans\", ui-sans-serif, system-ui, -apple-system,\n               BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  /* Wordmark + display headings use the mono at heavy weight. */\n  --font-display: \"JetBrains Mono\", ui-monospace, Menlo, Consolas, monospace;\n\n  /* ---- Weights --------------------------------- @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-black:    800; /* @kind font */\n\n  /* ---- Type scale (px / line-height) --------------------\n     Compact, terminal-leaning. 13px is the canonical UI body\n     size in the product; we anchor there.                  */\n  --text-2xs:   11px;   --lh-2xs:   1.35; /* @kind font */\n  --text-xs:    12px;   --lh-xs:    1.45; /* @kind font */\n  --text-sm:    13px;   --lh-sm:    1.5;  /* @kind font */\n  --text-base:  15px;   --lh-base:  1.6;  /* @kind font */\n  --text-md:    17px;   --lh-md:    1.55; /* @kind font */\n  --text-lg:    20px;   --lh-lg:    1.4;  /* @kind font */\n  --text-xl:    26px;   --lh-xl:    1.25; /* @kind font */\n  --text-2xl:   34px;   --lh-2xl:   1.15; /* @kind font */\n  --text-3xl:   46px;   --lh-3xl:   1.08; /* @kind font */\n  --text-4xl:   62px;   --lh-4xl:   1.02; /* @kind font */\n\n  /* ---- Letter-spacing -----------------------------------\n     Mono display gets negative tracking (the wordmark sets\n     letter-spacing:-2 at 64px). Micro-labels get positive. */\n  --tracking-tight:  -0.03em; /* @kind font */\n  --tracking-snug:   -0.01em; /* @kind font */\n  --tracking-normal:  0;       /* @kind font */\n  --tracking-wide:    0.04em; /* @kind font */\n  --tracking-caps:    0.08em; /* @kind font */\n\n  /* ---- Semantic role aliases ---------------------------- */\n  --type-eyebrow-size: var(--text-2xs);   /* UPPERCASE section tag */\n  --type-label-size:   var(--text-xs);\n  --type-ui-size:      var(--text-sm);\n  --type-body-size:    var(--text-base);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc · spacing & layout tokens\n   4px base grid. The product UI is dense (tables, log rows,\n   JSON), so the lower steps see the most use.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-0_5: 2px;\n  --space-1:   4px;\n  --space-1_5: 6px;\n  --space-2:   8px;\n  --space-2_5: 10px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-7:   28px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ---- Container widths --------------------------------- */\n  --container-prose: 68ch;     /* readable doc column     */\n  --container-narrow: 720px;\n  --container-wide:   1100px;\n  --container-max:    1320px;\n\n  /* ---- Component sizing --------------------------------- */\n  --control-h-sm: 26px;        /* dense toolbar control   */\n  --control-h-md: 32px;        /* default button/input    */\n  --control-h-lg: 40px;        /* prominent CTA           */\n  --tap-min:      44px;        /* min touch target        */\n\n  /* ---- Grid / sidebar ----------------------------------- */\n  --sidebar-w:      280px;     /* dashboard activity panel */\n  --header-h:       48px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc · radius, border, shadow & motion tokens\n   The product reads as a precise developer tool: small radii\n   (3–6px), hairline borders, restrained shadows. No glow, no\n   heavy drop-shadows. Motion is quick and functional.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radius ------------------------------------ */\n  --radius-xs:  2px;\n  --radius-sm:  3px;    /* badges, inline chips, kbd        */\n  --radius-md:  4px;    /* buttons, inputs (canonical)      */\n  --radius-lg:  6px;    /* cards, panels, dialogs           */\n  --radius-xl:  10px;   /* hero / banner blocks             */\n  --radius-pill: 999px;\n\n  /* ---- Border widths ------------------------------------ */\n  --border-hair: 1px;\n  --border-thick: 2px;   /* active row accent, focus edge   */\n\n  /* ---- Shadows ------------------------------------------\n     Subtle, cool-neutral. Elevation climbs from card→popover.\n     Dark theme dampens shadow and leans on borders instead. */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 1px rgba(20, 14, 10, 0.04);\n  --shadow-sm:  0 1px 2px rgba(20, 14, 10, 0.06),\n                0 1px 1px rgba(20, 14, 10, 0.04);\n  --shadow-md:  0 2px 8px rgba(20, 14, 10, 0.10);            /* tooltip   */\n  --shadow-lg:  0 8px 24px rgba(20, 14, 10, 0.12),\n                0 2px 6px rgba(20, 14, 10, 0.08);            /* popover   */\n  --shadow-xl:  0 18px 48px rgba(20, 14, 10, 0.18),\n                0 4px 12px rgba(20, 14, 10, 0.10);           /* dialog    */\n  /* focus halo — paired with --focus-ring color in colors.css */\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n  /* warm tint for accent-on-hover lifts */\n  --shadow-accent: 0 2px 10px color-mix(in oklch, var(--accent) 30%, transparent);\n\n  /* ---- Motion ------------------------------------------- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */\n  --ease-snap:  cubic-bezier(0.5, 1.4, 0.5, 1);   /* @kind other */\n\n  --dur-instant: 80ms;    /* @kind other */\n  --dur-fast:    140ms;   /* @kind other */\n  --dur-medium:  240ms;   /* @kind other */\n  --dur-slow:    400ms;   /* @kind other */\n  /* the dashboard's \"live\" pulse + fresh-row fade cadence */\n  --dur-pulse:   1600ms;  /* @kind other */\n\n  --transition-control:\n    background-color var(--dur-fast) var(--ease-out),\n    border-color var(--dur-fast) var(--ease-out),\n    color var(--dur-fast) var(--ease-out),\n    box-shadow var(--dur-fast) var(--ease-out);\n}\n\n:root[data-theme=\"dark\"] {\n  --shadow-xs:  0 1px 1px rgba(0, 0, 0, 0.4);\n  --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.5);\n  --shadow-md:  0 2px 8px rgba(0, 0, 0, 0.55);\n  --shadow-lg:  0 8px 24px rgba(0, 0, 0, 0.6);\n  --shadow-xl:  0 18px 48px rgba(0, 0, 0, 0.7);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc · base layer\n   Lightweight resets + element defaults wired to tokens, plus\n   a few utility classes the cards and components lean on.\n   Kept minimal so consuming pages stay in control.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-size-adjust: 100%;\n}\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--lh-base);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Headings default to the mono display face */\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--tracking-snug);\n  margin: 0 0 0.5em;\n}\nh1 { font-size: var(--text-3xl); line-height: var(--lh-3xl); font-weight: var(--fw-black); letter-spacing: var(--tracking-tight); }\nh2 { font-size: var(--text-2xl); line-height: var(--lh-2xl); }\nh3 { font-size: var(--text-xl);  line-height: var(--lh-xl); }\nh4 { font-size: var(--text-lg);  line-height: var(--lh-lg); }\n\np { margin: 0 0 1em; }\n\na {\n  color: var(--text-accent);\n  text-decoration: none;\n}\na:hover { text-decoration: underline; text-underline-offset: 2px; }\n\ncode, kbd, pre, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n/* Inline code chip */\ncode {\n  background: var(--surface-sunken);\n  border: var(--border-hair) solid var(--border-subtle);\n  border-radius: var(--radius-sm);\n  padding: 0.08em 0.36em;\n  color: var(--text-body);\n}\npre code { background: none; border: 0; padding: 0; }\n\n::selection {\n  background: color-mix(in oklch, var(--accent) 28%, transparent);\n}\n\n:focus-visible {\n  outline: var(--border-thick) solid var(--accent);\n  outline-offset: 2px;\n}\n\nhr {\n  border: 0;\n  border-top: var(--border-hair) solid var(--border-subtle);\n  margin: var(--space-6) 0;\n}\n\n/* ---- Utility helpers --------------------------------------- */\n\n/* UPPERCASE eyebrow label — used all over the product chrome */\n.ds-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--type-eyebrow-size);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-caps);\n  color: var(--text-muted);\n}\n\n.ds-mono { font-family: var(--font-mono); }\n.ds-sans { font-family: var(--font-sans); }\n\n/* Keyboard key cap */\nkbd {\n  font-family: var(--font-mono);\n  font-size: var(--text-2xs);\n  background: var(--surface-card);\n  border: var(--border-hair) solid var(--border-strong);\n  border-bottom-width: var(--border-thick);\n  border-radius: var(--radius-sm);\n  padding: 1px 5px;\n  color: var(--text-body);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   crabcc design system · global entry point\n   Consumers link THIS file. It is an @import manifest only —\n   no rules live here. Order: fonts → tokens → base layer.\n   ============================================================ */\n\n/* ============================================================\n   crabcc · webfonts\n   JetBrains Mono — primary mono + wordmark/display (terminal feel)\n   IBM Plex Sans  — long-form / marketing body\n   Self-hosted woff2 (latin). Source: fontsource.org\n   ============================================================ */\n\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"08b1f66c-0d6b-4a10-9f4b-f85851b8761c\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"c5d2289d-f07b-433d-b3b6-ce40d68e63bf\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e8082462-835c-4188-b5e8-0ccd6d4ab6df\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"JetBrains Mono\";\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"296899ff-0dea-4092-9a88-64374b534f68\") format(\"woff2\");\n}\n\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"35481201-213a-4086-9167-27cadc009249\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"230cf426-7586-4dac-8403-7e77be649cd2\") format(\"woff2\");\n}\n@font-face {\n  font-family: \"IBM Plex Sans\";\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d53f24b6-a973-4a4d-ae03-6f0777b1142a\") format(\"woff2\");\n}\n\n/* ============================================================\n   crabcc · color tokens\n   Warm terracotta \"crab\" brand on a near-neutral terminal canvas.\n   Derived from the CLI dashboard theme + the mascot SVG gradients.\n\n   Two layers:\n     1. Base palette  — raw, named hues (--crab-500, --slate-700, …)\n     2. Semantic aliases — role-based (--surface, --text, --accent, …)\n   Consume the SEMANTIC tokens in components; reach for the base\n   palette only when a semantic alias doesn't exist.\n\n   Theme: light is the default (:root). Dark is opt-in via\n   [data-theme=\"dark\"] and auto-applied under prefers-color-scheme.\n   ============================================================ */\n\n:root {\n  /* ---- Base palette: crab (brand) ------------------------- */\n  --crab-50:  #fff7f1;   /* cream — banner bg top, hover wash      */\n  --crab-100: #fbe5da;   /* pale shell — banner bg bottom          */\n  --crab-200: #f5cdbb;   /* soft shell                             */\n  --crab-300: #e88a6a;   /* mascot highlight                       */\n  --crab-400: #e2703f;   /* warm mid                               */\n  --crab-500: #d35400;   /* PRIMARY accent (light)                 */\n  --crab-600: #c25c3f;   /* mascot body base                       */\n  --crab-700: #a84a30;   /* claw shadow                            */\n  --crab-800: #7d3520;   /* deep shell — wordmark ink              */\n  --crab-900: #5a2415;   /* darkest shell                          */\n  --crab-hot: #ff8c42;   /* \"hot\" node / accent (dark)             */\n  --crab-glow:#ffb380;   /* hot highlight                          */\n\n  /* ---- Base palette: neutral (warm-tinted graphite) ------- */\n  --neutral-0:   #ffffff;\n  --neutral-50:  #fafafa;\n  --neutral-100: #f3f3f2;\n  --neutral-200: #e3e3e3;\n  --neutral-300: #cfcfcd;\n  --neutral-400: #a8a8a6;\n  --neutral-500: #6a6a6a;\n  --neutral-600: #4a4a4a;\n  --neutral-700: #2a2a2c;\n  --neutral-800: #161618;\n  --neutral-900: #0e0e10;\n\n  /* ---- Base palette: slate (graph nodes / data ink) ------- */\n  --slate-300: #cfd6dc;\n  --slate-500: #5b7286;\n  --slate-700: #2c3e50;\n\n  /* ---- Base palette: semantic hues ------------------------ */\n  --green-500: #27ae60;  /* live / ok          */\n  --green-400: #2ecc71;\n  --amber-500: #f5a623;  /* warn               */\n  --amber-400: #f6b94a;\n  --red-500:   #c0392b;  /* error / danger     */\n  --red-400:   #e74c3c;\n  --blue-500:  #2c6fb0;  /* info / link        */\n\n  /* ========================================================\n     Semantic aliases — LIGHT (default)\n     ======================================================== */\n  --surface-page:    var(--neutral-50);   /* app background        */\n  --surface-card:    var(--neutral-0);    /* panels, cards         */\n  --surface-sunken:  var(--neutral-100);  /* inset wells, code     */\n  --surface-hover:   var(--crab-50);      /* row / control hover   */\n  --surface-inverse: var(--neutral-900);  /* terminal, tooltips    */\n\n  --text-strong:  #1a1a1a;                /* headings, primary     */\n  --text-body:    #2a2a2c;                /* body copy             */\n  --text-muted:   var(--neutral-500);     /* labels, meta, dim     */\n  --text-faint:   var(--neutral-400);     /* placeholders          */\n  --text-inverse: #f2f2f2;                /* on dark surfaces      */\n  --text-accent:  var(--crab-500);        /* links, emphasis       */\n  --text-on-accent: #ffffff;              /* on filled brand       */\n\n  --border-subtle: var(--neutral-200);    /* default hairline      */\n  --border-strong: var(--neutral-300);    /* inputs, dividers      */\n  --border-accent: var(--crab-500);       /* focus, active edge    */\n\n  --accent:        var(--crab-500);       /* primary brand action  */\n  --accent-hover:  var(--crab-600);       /* hover (darker)        */\n  --accent-press:  var(--crab-700);       /* active/press          */\n  --accent-wash:   var(--crab-50);        /* tinted backgrounds    */\n  --accent-wash-2: var(--crab-100);\n\n  --focus-ring:    color-mix(in oklch, var(--crab-500) 45%, transparent);\n\n  /* role hues (light) */\n  --ok:     var(--green-500);\n  --ok-wash:#e7f6ee;\n  --warn:   var(--amber-500);\n  --warn-wash:#fcf2dd;\n  --danger: var(--red-500);\n  --danger-wash:#fbe7e4;\n  --info:   var(--blue-500);\n  --info-wash:#e6eef6;\n\n  /* data-viz (graph dashboard) */\n  --viz-node:     var(--slate-700);\n  --viz-node-root:var(--crab-500);\n  --viz-node-hot: var(--crab-hot);\n  --viz-edge:     #b8b8b8;\n\n  color-scheme: light;\n}\n\n/* ==========================================================\n   Semantic aliases — DARK\n   Applied explicitly via [data-theme=\"dark\"], or automatically\n   when the OS prefers dark AND no explicit light override.\n   ========================================================== */\n:root[data-theme=\"dark\"] {\n  --surface-page:    var(--neutral-900);\n  --surface-card:    var(--neutral-800);\n  --surface-sunken:  #1c1c1f;\n  --surface-hover:   #2a1f10;\n  --surface-inverse: #000000;\n\n  --text-strong:  #f2f2f2;\n  --text-body:    #e8e8e8;\n  --text-muted:   #8a8a8a;\n  --text-faint:   #6a6a6c;\n  --text-inverse: #1a1a1a;\n  --text-accent:  var(--crab-hot);\n  --text-on-accent: #1a1208;\n\n  --border-subtle: var(--neutral-700);\n  --border-strong: #3a3a3c;\n  --border-accent: var(--crab-hot);\n\n  --accent:        var(--crab-hot);\n  --accent-hover:  var(--crab-glow);\n  --accent-press:  #e2703f;\n  --accent-wash:   #2a1f10;\n  --accent-wash-2: #34250f;\n\n  --focus-ring:    color-mix(in oklch, var(--crab-hot) 50%, transparent);\n\n  --ok:     var(--green-400);\n  --ok-wash:#0f2a1c;\n  --warn:   var(--amber-400);\n  --warn-wash:#2e2510;\n  --danger: var(--red-400);\n  --danger-wash:#2e1512;\n  --info:   #5b9bd5;\n  --info-wash:#13202e;\n\n  --viz-node:     var(--slate-300);\n  --viz-node-root:var(--crab-hot);\n  --viz-node-hot: var(--crab-glow);\n  --viz-edge:     #4a4a4c;\n\n  color-scheme: dark;\n}\n\n/* Auto dark mode: alias the OS preference onto the dark scope without\n   redeclaring tokens (keeps the token index single-sourced from\n   [data-theme=\"dark\"] above). Authors opt a root into auto-dark by\n   leaving data-theme unset; force light with [data-theme=\"light\"]. */\n@media (prefers-color-scheme: dark) {\n  :root:not([data-theme=\"light\"]):not([data-theme=\"dark\"]) {\n    color-scheme: dark;\n  }\n}\n\n/* ============================================================\n   crabcc · typography tokens\n   Monospace-first: the product is a CLI. JetBrains Mono carries\n   the wordmark, UI chrome, code and data. IBM Plex Sans handles\n   long-form reading (docs, marketing prose).\n   ============================================================ */\n\n:root {\n  /* ---- Families ----------------------------------------- */\n  --font-mono: \"JetBrains Mono\", ui-monospace, \"SF Mono\", \"SFMono-Regular\",\n               Menlo, Consolas, \"Liberation Mono\", monospace;\n  --font-sans: \"IBM Plex Sans\", ui-sans-serif, system-ui, -apple-system,\n               BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  /* Wordmark + display headings use the mono at heavy weight. */\n  --font-display: \"JetBrains Mono\", ui-monospace, Menlo, Consolas, monospace;\n\n  /* ---- Weights --------------------------------- @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-black:    800; /* @kind font */\n\n  /* ---- Type scale (px / line-height) --------------------\n     Compact, terminal-leaning. 13px is the canonical UI body\n     size in the product; we anchor there.                  */\n  --text-2xs:   11px;   --lh-2xs:   1.35; /* @kind font */\n  --text-xs:    12px;   --lh-xs:    1.45; /* @kind font */\n  --text-sm:    13px;   --lh-sm:    1.5;  /* @kind font */\n  --text-base:  15px;   --lh-base:  1.6;  /* @kind font */\n  --text-md:    17px;   --lh-md:    1.55; /* @kind font */\n  --text-lg:    20px;   --lh-lg:    1.4;  /* @kind font */\n  --text-xl:    26px;   --lh-xl:    1.25; /* @kind font */\n  --text-2xl:   34px;   --lh-2xl:   1.15; /* @kind font */\n  --text-3xl:   46px;   --lh-3xl:   1.08; /* @kind font */\n  --text-4xl:   62px;   --lh-4xl:   1.02; /* @kind font */\n\n  /* ---- Letter-spacing -----------------------------------\n     Mono display gets negative tracking (the wordmark sets\n     letter-spacing:-2 at 64px). Micro-labels get positive. */\n  --tracking-tight:  -0.03em; /* @kind font */\n  --tracking-snug:   -0.01em; /* @kind font */\n  --tracking-normal:  0;       /* @kind font */\n  --tracking-wide:    0.04em; /* @kind font */\n  --tracking-caps:    0.08em; /* @kind font */\n\n  /* ---- Semantic role aliases ---------------------------- */\n  --type-eyebrow-size: var(--text-2xs);   /* UPPERCASE section tag */\n  --type-label-size:   var(--text-xs);\n  --type-ui-size:      var(--text-sm);\n  --type-body-size:    var(--text-base);\n}\n\n/* ============================================================\n   crabcc · spacing & layout tokens\n   4px base grid. The product UI is dense (tables, log rows,\n   JSON), so the lower steps see the most use.\n   ============================================================ */\n\n:root {\n  --space-0:   0;\n  --space-px:  1px;\n  --space-0_5: 2px;\n  --space-1:   4px;\n  --space-1_5: 6px;\n  --space-2:   8px;\n  --space-2_5: 10px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-7:   28px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n  --space-16:  64px;\n  --space-20:  80px;\n  --space-24:  96px;\n  --space-32:  128px;\n\n  /* ---- Container widths --------------------------------- */\n  --container-prose: 68ch;     /* readable doc column     */\n  --container-narrow: 720px;\n  --container-wide:   1100px;\n  --container-max:    1320px;\n\n  /* ---- Component sizing --------------------------------- */\n  --control-h-sm: 26px;        /* dense toolbar control   */\n  --control-h-md: 32px;        /* default button/input    */\n  --control-h-lg: 40px;        /* prominent CTA           */\n  --tap-min:      44px;        /* min touch target        */\n\n  /* ---- Grid / sidebar ----------------------------------- */\n  --sidebar-w:      280px;     /* dashboard activity panel */\n  --header-h:       48px;\n}\n\n/* ============================================================\n   crabcc · radius, border, shadow & motion tokens\n   The product reads as a precise developer tool: small radii\n   (3–6px), hairline borders, restrained shadows. No glow, no\n   heavy drop-shadows. Motion is quick and functional.\n   ============================================================ */\n\n:root {\n  /* ---- Corner radius ------------------------------------ */\n  --radius-xs:  2px;\n  --radius-sm:  3px;    /* badges, inline chips, kbd        */\n  --radius-md:  4px;    /* buttons, inputs (canonical)      */\n  --radius-lg:  6px;    /* cards, panels, dialogs           */\n  --radius-xl:  10px;   /* hero / banner blocks             */\n  --radius-pill: 999px;\n\n  /* ---- Border widths ------------------------------------ */\n  --border-hair: 1px;\n  --border-thick: 2px;   /* active row accent, focus edge   */\n\n  /* ---- Shadows ------------------------------------------\n     Subtle, cool-neutral. Elevation climbs from card→popover.\n     Dark theme dampens shadow and leans on borders instead. */\n  --shadow-none: none;\n  --shadow-xs:  0 1px 1px rgba(20, 14, 10, 0.04);\n  --shadow-sm:  0 1px 2px rgba(20, 14, 10, 0.06),\n                0 1px 1px rgba(20, 14, 10, 0.04);\n  --shadow-md:  0 2px 8px rgba(20, 14, 10, 0.10);            /* tooltip   */\n  --shadow-lg:  0 8px 24px rgba(20, 14, 10, 0.12),\n                0 2px 6px rgba(20, 14, 10, 0.08);            /* popover   */\n  --shadow-xl:  0 18px 48px rgba(20, 14, 10, 0.18),\n                0 4px 12px rgba(20, 14, 10, 0.10);           /* dialog    */\n  /* focus halo — paired with --focus-ring color in colors.css */\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n  /* warm tint for accent-on-hover lifts */\n  --shadow-accent: 0 2px 10px color-mix(in oklch, var(--accent) 30%, transparent);\n\n  /* ---- Motion ------------------------------------------- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */\n  --ease-in-out:cubic-bezier(0.65, 0, 0.35, 1);   /* @kind other */\n  --ease-snap:  cubic-bezier(0.5, 1.4, 0.5, 1);   /* @kind other */\n\n  --dur-instant: 80ms;    /* @kind other */\n  --dur-fast:    140ms;   /* @kind other */\n  --dur-medium:  240ms;   /* @kind other */\n  --dur-slow:    400ms;   /* @kind other */\n  /* the dashboard's \"live\" pulse + fresh-row fade cadence */\n  --dur-pulse:   1600ms;  /* @kind other */\n\n  --transition-control:\n    background-color var(--dur-fast) var(--ease-out),\n    border-color var(--dur-fast) var(--ease-out),\n    color var(--dur-fast) var(--ease-out),\n    box-shadow var(--dur-fast) var(--ease-out);\n}\n\n:root[data-theme=\"dark\"] {\n  --shadow-xs:  0 1px 1px rgba(0, 0, 0, 0.4);\n  --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.5);\n  --shadow-md:  0 2px 8px rgba(0, 0, 0, 0.55);\n  --shadow-lg:  0 8px 24px rgba(0, 0, 0, 0.6);\n  --shadow-xl:  0 18px 48px rgba(0, 0, 0, 0.7);\n}\n\n/* ============================================================\n   crabcc · base layer\n   Lightweight resets + element defaults wired to tokens, plus\n   a few utility classes the cards and components lean on.\n   Kept minimal so consuming pages stay in control.\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  text-size-adjust: 100%;\n}\n\nbody {\n  margin: 0;\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--lh-base);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Headings default to the mono display face */\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  color: var(--text-strong);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--tracking-snug);\n  margin: 0 0 0.5em;\n}\nh1 { font-size: var(--text-3xl); line-height: var(--lh-3xl); font-weight: var(--fw-black); letter-spacing: var(--tracking-tight); }\nh2 { font-size: var(--text-2xl); line-height: var(--lh-2xl); }\nh3 { font-size: var(--text-xl);  line-height: var(--lh-xl); }\nh4 { font-size: var(--text-lg);  line-height: var(--lh-lg); }\n\np { margin: 0 0 1em; }\n\na {\n  color: var(--text-accent);\n  text-decoration: none;\n}\na:hover { text-decoration: underline; text-underline-offset: 2px; }\n\ncode, kbd, pre, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\n/* Inline code chip */\ncode {\n  background: var(--surface-sunken);\n  border: var(--border-hair) solid var(--border-subtle);\n  border-radius: var(--radius-sm);\n  padding: 0.08em 0.36em;\n  color: var(--text-body);\n}\npre code { background: none; border: 0; padding: 0; }\n\n::selection {\n  background: color-mix(in oklch, var(--accent) 28%, transparent);\n}\n\n:focus-visible {\n  outline: var(--border-thick) solid var(--accent);\n  outline-offset: 2px;\n}\n\nhr {\n  border: 0;\n  border-top: var(--border-hair) solid var(--border-subtle);\n  margin: var(--space-6) 0;\n}\n\n/* ---- Utility helpers --------------------------------------- */\n\n/* UPPERCASE eyebrow label — used all over the product chrome */\n.ds-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--type-eyebrow-size);\n  font-weight: var(--fw-bold);\n  text-transform: uppercase;\n  letter-spacing: var(--tracking-caps);\n  color: var(--text-muted);\n}\n\n.ds-mono { font-family: var(--font-mono); }\n.ds-sans { font-family: var(--font-sans); }\n\n/* Keyboard key cap */\nkbd {\n  font-family: var(--font-mono);\n  font-size: var(--text-2xs);\n  background: var(--surface-card);\n  border: var(--border-hair) solid var(--border-strong);\n  border-bottom-width: var(--border-thick);\n  border-radius: var(--radius-sm);\n  padding: 1px 5px;\n  color: var(--text-body);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n}\n\n<\u002Fstyle>\n  <script src=\"4747c5b2-38aa-4516-833d-c171064dd822\"><\u002Fscript>\n  <script src=\"995d523c-17ca-4594-b6ee-2bdff231cfcd\"><\u002Fscript>\n  <script>document.documentElement.setAttribute(\"data-theme\", \"dark\");<\u002Fscript>\n  <style>\n    html, body { margin: 0; background: #0e0e10; }\n    body { font-family: \"JetBrains Mono\", ui-monospace, Menlo, monospace; }\n    a { color: var(--text-accent, #ff8c42); text-decoration: none; }\n    a:hover { text-decoration: underline; text-underline-offset: 2px; }\n    ::selection { background: rgba(255, 140, 66, .3); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:relative;min-height:100vh;background:var(--surface-page,#0e0e10);color:var(--text-body,#e8e8e8)\">\n  <sc-if value=\"{{ aurora }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:0;pointer-events:none\">\n      <x-import component-from-global-scope=\"CrabccDesignSystem_325a37.Shader or&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;shell&quot;, &quot;paper&quot;], &quot;default&quot;: &quot;shell&quot;, &quot;tsType&quot;: &quot;\\&quot;shell\\&quot; | \\&quot;paper\\&quot;&quot;, &quot;section&quot;: &quot;qr&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { title: null, sub: null, mode: \"vcard\", copied: false };\n  VCARD = \"BEGIN:VCARD\\r\\nVERSION:3.0\\r\\nFN:Peter Lodri\\r\\nN:Lodri;Peter;;;\\r\\nEMAIL:cabotage@pm.me\\r\\nURL:https://peterl.dev\\r\\nURL:https://github.com/peterlodri-sec\\r\\nEND:VCARD\";\n  componentDidMount() {\n    document.documentElement.setAttribute(\"data-theme\", \"dark\");\n    this._whenQR(() => { this._drawMinis(); this._retarget(null, true); });\n  }\n  componentWillUnmount() { cancelAnimationFrame(this._raf); clearTimeout(this._leaveT); clearTimeout(this._copyT); }\n  componentDidUpdate(prevProps) {\n    if (prevProps && prevProps.qrInk !== this.props.qrInk) {\n      this._current = null;\n      this._drawMinis();\n      this._retarget(this.state.mode === \"url\" ? this.state.sub : null, true);\n    }\n  }\n  _whenQR(cb) { if (window.QRKit) cb(); else setTimeout(() => this._whenQR(cb), 80); }\n  _ink() { return (this.props.qrInk ?? \"shell\") === \"paper\" ? { bg: \"#ffffff\", fg: \"#111111\" } : { bg: \"#fff7f1\", fg: \"#5a2415\" }; }\n  _drawMinis() {\n    const ink = this._ink();\n    document.querySelectorAll(\"canvas[data-qr]\").forEach((c) => {\n      try { QRKit.draw(c, QRKit.encode(c.dataset.qr, \"M\"), { width: 64, quiet: 1, bg: ink.bg, fg: ink.fg }); } catch (e) {}\n    });\n  }\n  _retarget(url, instant) {\n    const canvas = document.querySelector(\"canvas[data-hero-qr]\");\n    if (!canvas || !window.QRKit) return;\n    const text = url || this.VCARD;\n    if (text === this._current) return;\n    this._current = text;\n    let qr;\n    try { qr = QRKit.encode(text, \"M\"); } catch (e) { return; }\n    cancelAnimationFrame(this._raf);\n    const ink = this._ink();\n    const opts = { width: 264, quiet: 2, bg: ink.bg, fg: ink.fg };\n    if (instant || !(this.props.animateQr ?? true)) { QRKit.draw(canvas, qr, opts); return; }\n    const t0 = performance.now(), dur = 420;\n    const step = (t) => {\n      const p = Math.min(1, (t - t0) / dur);\n      QRKit.draw(canvas, qr, Object.assign({}, opts, { reveal: 1 - Math.pow(1 - p, 3) }));\n      if (p < 1) this._raf = requestAnimationFrame(step);\n    };\n    this._raf = requestAnimationFrame(step);\n  }\n  hover = (e) => {\n    const d = e.currentTarget.dataset;\n    clearTimeout(this._leaveT);\n    this.setState({ title: d.title, sub: d.url, mode: \"url\" });\n    this._retarget(d.url);\n  };\n  leave = () => {\n    clearTimeout(this._leaveT);\n    this._leaveT = setTimeout(() => {\n      this.setState({ title: null, sub: null, mode: \"vcard\" });\n      this._retarget(null);\n    }, 320);\n  };\n  copyEmail = () => {\n    if (navigator.clipboard) navigator.clipboard.writeText(\"cabotage@pm.me\");\n    this.setState({ copied: true });\n    clearTimeout(this._copyT);\n    this._copyT = setTimeout(() => this.setState({ copied: false }), 1600);\n  };\n  renderVals() {\n    return {\n      aurora: this.props.aurora ?? true,\n      hover: this.hover,\n      leave: this.leave,\n      copyEmail: this.copyEmail,\n      copyLabel: this.state.copied ? \"copied ✓\" : \"copy email\",\n      qrMode: this.state.mode === \"vcard\" ? \"● vcard\" : \"→ link\",\n      qrTitle: this.state.title || \"peter lodri — contact card\",\n      qrSub: this.state.sub || \"vCard 3.0 · email · urls · scan to save\",\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
